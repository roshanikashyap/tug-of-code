<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tug of Code - Battleground</title>
    <style>
        :root {
            --bg-purple: #1a0b2e;
            --panel-purple: #3d2461;
            --accent-pink: #ff00ff;
            --team-a-color: #00d2ff;
            --team-b-color: #ff9f43;
            --success-green: #4CAF7B;
        }

        body {
            margin: 0;
            background: var(--bg-purple);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .score-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            background: rgba(0,0,0,0.6);
            border-bottom: 3px solid var(--accent-pink);
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .score-box { padding: 10px 25px; border-radius: 15px; min-width: 200px; text-align: center; }
        #t1-display { border: 3px solid var(--team-a-color); color: var(--team-a-color); box-shadow: 0 0 15px var(--team-a-color); }
        #t2-display { border: 3px solid var(--team-b-color); color: var(--team-b-color); box-shadow: 0 0 15px var(--team-b-color); }

        #arena {
            position: relative;
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
        }

        #rope {
            position: absolute;
            height: 12px;
            width: 300%;
            background: linear-gradient(90deg, #333, #eee, #333);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .team-squad {
            position: absolute;
            display: flex;
            gap: 15px;
            transition: transform 0.5s ease;
            z-index: 2;
        }

        .character {
            width: 50px;
            height: 70px;
            border-radius: 12px 12px 4px 4px;
            position: relative;
            animation: bounce 0.6s infinite alternate;
        }

        .character::before { content: '● ●'; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: white; font-size: 10px; }
        .c-left { background: var(--team-a-color); box-shadow: 0 0 20px var(--team-a-color); }
        .c-right { background: var(--team-b-color); box-shadow: 0 0 20px var(--team-b-color); }

        .game-ui { display: flex; width: 95%; gap: 30px; flex: 1; padding-bottom: 30px; }
        .quiz-card { flex: 1; background: var(--panel-purple); border-radius: 25px; padding: 25px; display: flex; flex-direction: column; border: 3px solid rgba(255,255,255,0.1); transition: border-color 0.3s; }
        .question-text { font-size: 1.3rem; min-height: 90px; margin-bottom: 20px; text-align: center; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ans-btn { background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.1); color: white; padding: 18px; border-radius: 15px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; font-weight: bold; }
        .ans-btn:hover { background: var(--accent-pink); transform: translateY(-4px); }

        #win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .win-content h1 { font-size: 4rem; color: var(--accent-pink); text-shadow: 0 0 20px var(--accent-pink); }
        .play-again-btn { background: var(--success-green); color: white; padding: 15px 40px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
        .confetti { position: absolute; width: 10px; height: 10px; animation: fall 3s linear infinite; z-index: 1001; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>

        const topicData = masterBank[gameData.topic] || masterBank["basics of computer"];
        const rawPool = topicData[gameData.difficulty] || topicData.easy;
        let activePool = [...rawPool];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        shuffle(activePool);

        let scores = { t1: 0, t2: 0 };
        let ropePos = 0;
        const winLimit = gameData.pointsToWin * 60;

        function init() {
            document.getElementById('t1-display').innerText = `${gameData.team1}: 0`;
            document.getElementById('t2-display').innerText = `${gameData.team2}: 0`;
            document.getElementById('topic-tag').innerText = `TOPIC: ${gameData.topic.toUpperCase()} (${gameData.difficulty.toUpperCase()})`;
            spawnTeams();
            renderQuestion(1);
            renderQuestion(2);
        }

        function spawnTeams() {
            const left = document.getElementById('team-left-squad');
            const right = document.getElementById('team-right-squad');
            left.innerHTML = ''; right.innerHTML = '';
            for(let i=0; i<5; i++) {
                left.innerHTML += `<div class="character c-left"></div>`;
                right.innerHTML += `<div class="character c-right"></div>`;
            }
        }

        function renderQuestion(playerNum) {
            if (activePool.length === 0) {
                activePool = [...rawPool];
                shuffle(activePool);
            }

            const qData = activePool.pop();
            const qDiv = document.getElementById(`q${playerNum}`);
            const optDiv = document.getElementById(`opts-${playerNum}`);
            
            qDiv.innerText = qData.q;
            optDiv.innerHTML = '';

            shuffle([...qData.o]).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(playerNum, opt, qData.a);
                optDiv.appendChild(btn);
            });
        }

        function handleAnswer(player, selected, correct) {
            if(selected === correct) {
                document.getElementById('sfx-correct').currentTime = 0;
                document.getElementById('sfx-correct').play();
                scores[`t${player}`]++;
                document.getElementById(`t${player}-display`).innerText = `${player === 1 ? gameData.team1 : gameData.team2}: ${scores[`t${player}`]}`;
                ropePos += (player === 1 ? -60 : 60);
                updateVisuals();
                renderQuestion(player);
                checkWin();
            } else {
                const card = document.getElementById(`card-${player}`);
                card.style.borderColor = "#ff4757";
                card.animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0px)' }
                ], { duration: 200 });
                setTimeout(() => card.style.borderColor = "rgba(255,255,255,0.1)", 400);
            }
        }

        function updateVisuals() {
            document.getElementById('rope').style.transform = `translateX(${ropePos}px)`;
            document.getElementById('team-left-squad').style.transform = `translateX(${ropePos}px)`;
            document.getElementById('team-right-squad').style.transform = `translateX(${ropePos}px)`;
        }

        function checkWin() {
            if(Math.abs(ropePos) >= winLimit) {
                const winner = ropePos < 0 ? gameData.team1 : gameData.team2;
                showVictory(winner);
            }
        }

        function showVictory(name) {
            document.getElementById('winner-name').innerText = name + " WINS!";
            document.getElementById('win-overlay').style.display = 'flex';
            for(let i=0; i<100; i++) createConfetti();
        }

        function createConfetti() {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = ['#ff00ff','#00d2ff','#ff9f43','#4CAF7B'][Math.floor(Math.random()*4)];
            c.style.animationDuration = (Math.random() * 3 + 2) + 's';
            c.style.opacity = Math.random();
            document.body.appendChild(c);
        }

        init();
    </script>
